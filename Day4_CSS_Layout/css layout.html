<!DOCTYPE html>
<html>

    <head>
        <style>
            body{
                background-color:lightblue;
            }

            h1{
                text-align: center;
                background-color: darkblue;
                color: white;
                padding:20px;
            }

            .card{
                background-color: yellow;
                border:3px solid black;
                width:200px;
                height:100px;
                margin:10px;
                border-radius:15px;
                text-align:center;
                
                display:flex;
                justify-content:center;
                align-items:center;

                font-size:18px;
                font-weight:bold;
            }

            .container{
                display:flex;
                justify-content:center;
            }

        </style>
        <title>Skill card</title>
    </head>

    <body>
        <h1>💻 My Skills</h1>
        <div class="container">
            <div class="card">🐍 Python</div>
            <div class="card">🌐 HTML</div>
            <div class="card">🎨 CSS</div>
            <div class="card">⚡ JavaScript</div>
        </div>

    </body>

</html>
