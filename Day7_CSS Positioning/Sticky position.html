<!DOCTYPE html>
<html>
    <head>
        <title>Sticky position</title> 
        <style>
            body{
                margin: 0;
            }
            
            .header{
                background-color: darkblue;
                text-align: center;
                padding: 20px;
                color: white;
            }

            .Sticky-box{
                background-color: green;
                text-align: center;
                padding: 15px;
                color: white;
                font-size: 20px;

                position: sticky;
                top: 0;
            }
        </style>
    </head>
    
    <body>
        <div class="header">
            <h1>My Website</h1>
        </div>

        <div class="Sticky-box">
            📌 Navigation Menu
        </div>

        <div style="height:1500px;">
            Scroll Down....
        </div>
    </body>
</html>
