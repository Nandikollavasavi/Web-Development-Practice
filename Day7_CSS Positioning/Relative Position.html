<!DOCTYPE html>
<html>
    <head>
        <title>Relative Position</title>
        <style>

            .box{
                height:100px;
                width:200px;
                background-color:yellow;
                position:relative;
                left:100px;
                top:100px;

                text-align: center;
                line-height: 80px;
                font-size: 20px;
            }
        </style>
    </head>
    <body>
        <div class="box">Hello Vasavi</div>
    </body>
</html>
