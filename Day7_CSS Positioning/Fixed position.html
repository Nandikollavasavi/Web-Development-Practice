<!DOCTYPE html>
<html>
    <head>
        <title>Fixed position</title>
        <style>
            .fixed-box{
                width:150px;
                height:80px;
                background-color: green;
                color: white;
                text-align: center;

                position:fixed;
                bottom: 20px;
                right:20px;
                
                border: 2px solid black;
                border-radius: 25px;
                line-height: 70px;

                font-size:20px;
                font-weight: bold;
                
            }
        </style>
    </head>
    <body>
        <h1>Fixed Position Example</h1>

        <p>Scroll down...</p>
        <div style="height:1500px";>Lots of content here.....</div>

        <div class="fixed-box">
            Chat 💬
        </div>
    </body>
</html>
