<!DOCTYPE html>
<html>
    <head>
        <title>Relative Position</title>
        <style>

            .parent{
                width:500px;
                height:300px;
                background-color:brown;
                border:3px solid black;

                position:relative;
            }

            .child{
                height:80px;
                width:150px;
                background-color:lightcoral;
                border: 2px solid black;

                position:absolute;
                right:50px;
                top:50px;

                text-align: center;
                font-size: 25px;
            }
        </style>
    </head>
    <body>
        <div class="parent">
            <div class="child">
                Hello vasavi!!
            </div>
        </div>
    </body>
</html>
