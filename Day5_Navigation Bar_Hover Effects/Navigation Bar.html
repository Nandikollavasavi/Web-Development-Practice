<!DOCTYPE html>
<html>
    <head>
        <title>Navigation bar</title>

        <style>
            .navbar{
                background-color: darkblue;
                padding: 20px;
                text-align: center;
            }

            .navbar a{
                    color: white;
                    text-decoration: none;
                    margin: 10px;
                    font-size:20px;
            }

            .navbar h1{
                color:white;
            }

            .navbar a:hover{
                    color:yellow;
            }
        </style>
    </head>

    <body>
        <div class="navbar">
            <h1>SkillUp</h1>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Skills</a>
            <a href="#">Project</a>
            <a href="#">Contact</a>
        </div>
    </body>

</html>
