<!DOCTYPE html>
<html>
    <head>
        <title>Transition</title>
        <style>
            button{
                background-color: darkblue;
                color: white;
                transition:5s;
            }

            button:hover{
                background-color: green;
            }
        </style>
    </head>
    <body>
        <button>Click Me</button>
    </body>
</html>
