<!DOCTYPE html>
<html>
    <head>
        <title>Transition</title>
        <style>
            .box{
                width:200px;
                height:200px;
                text-align: center;
                line-height: 190px;
                margin-top: 30px;
                font-size: 30px;
                background-color: skyblue;
                border-radius: 50%;
                border:2px solid black;

                animation:move 3s infinite;
            }
            @keyframes move{
                0%{
                    margin-left:0;
                }

                50%{
                    margin-left:300px;
                }

                100%{
                    margin-left:0;
                }
            }
        </style>
    </head>
    <body>
        <div class="box">Vasavi</div> 
    </body>
</html>
