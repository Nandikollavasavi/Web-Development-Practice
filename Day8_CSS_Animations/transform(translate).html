<!DOCTYPE html>
<html>
    <head>
        <title>Transition</title>
        <style>
            button{
                width: 150px;
                height: 100px;
            
                background-color: darkblue;
                color: white;
                transition:1s;
            }

            button:hover{
                background-color: green;

                transform:translateX(50px);
            }
        </style>
    </head>
    <body>
        <button>Click Me</button>
    </body>
</html>
