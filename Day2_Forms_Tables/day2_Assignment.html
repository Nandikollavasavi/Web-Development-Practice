<!DOCTYPE html>
<html>
    <head>
        <title>Student Registration Form</title>
    </head>
    <body>
        <h1>Student Registration Form</h1>
        <form>
            <label>Name:</label>
            <input type="text" placeholder="Enter your name">
            <br><br>
            <label>Email:</label>
            <input type="email" placeholder="Enter your Email">
            <br><br>
            <label>Phone Number:</label>
            <input type="number" placeholder="Enter your phone number">
            <br><br>
            <label>Password:</label>
            <input type="password" placeholder="Enter your Password">
            <br><br>
            <label>Gender:</label>
            <br><br>
            <input type="radio" name="Gender">
            <label>Male</label>
            <br>
            <input type="radio" name="Gender">
            <label>Female</label>
            <br><br>
            <label>Branch:</label>
            <br><br>
            <select>
                <option>CSE</option>
                <option>IT</option>
                <option>ECE</option>
            </select>
            <br><br>
            <label>Skills:</label>
            <br><br>
            <input type="checkbox">
            <label>HTML</label>
            <br>
            <input type="checkbox">
            <label>CSS</label>
            <br>
            <input type="checkbox">
            <label>JavaScript</label>
            <br>
            <input type="checkbox">
            <label>Python</label>
            <br><br>
            <label>Address:</label>
            <br><br>
            <textarea></textarea>
            <br><br>
            <button>Submit</button>
        </form>
    </body>
</html>
