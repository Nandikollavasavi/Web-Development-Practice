<!DOCTYPE html>
<html>
    <head>
        <title>shopping</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>🛍️ Our Products</h1>
        <div class="container">
            <div class="card">
                <img src="laptop.jpeg" alt="laptop">
                <h2>Acer Laptop</h2>
                <p>Fast CPU</p>
                <p>₹38,999</p>
                <button>Buy Now</button>
            </div>
            <div class="card">
                <img src="mobile.jpeg" alt="mobile">
                <h2>iQOO Z11X</h2>
                <p>5G Ready</p>
                <p>₹19,999</p>
                <button>Buy Now</button>
            </div>
            <div class="card">
                <img src="watch.jpeg" alt="watch">
                <h2>Watch</h2>
                <p>LimeStone</p>
                <p>₹253</p>
                <button>Buy Now</button>
            </div>
            <div class="card">
                <img src="shoes.jpeg" alt="shoes">
                <h2>Shoes</h2>
                <p>Premium Comfortable Shoes for Men</p>
                <p>₹375</p>
                <button>Buy Now</button>
            </div>
            <div class="card">
                <img src="camera.jpeg" alt="camera">
                <h2>Camera</h2>
                <p>Mirrorless Camera RF-S 18-45mm</p>
                <p>₹46,990</p>
                <button>Buy Now</button>
            </div>
            <div class="card">
                <img src="headset.jpeg" alt="headset">
                <h2>Bluetooth Headset</h2>
                <p>Carbon Black, On the Ear</p>
                <p>₹6,499</p>
                <button>Buy Now</button>
            </div>
        </div>
    </body>
</html>
